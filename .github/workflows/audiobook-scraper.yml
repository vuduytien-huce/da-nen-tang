name: Audiobook Metadata Scraper

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Nền tảng cần cào (fonos, voizfm, catalog)'
        required: true
        default: 'catalog'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run scrape:${{ github.event.inputs.platform || 'catalog' }}
